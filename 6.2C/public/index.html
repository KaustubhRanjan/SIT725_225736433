<!DOCTYPE html>
<html>
<head>
  <title>Books Catalog</title>
</head>
<body>
  <h1>Books List</h1>
  <div id="books"></div>

  <script>
    fetch('/api/books')
      .then(res => res.json())
      .then(result => {
        const container = document.getElementById('books');
        const books = result.data;

        books.forEach(book => {
          const div = document.createElement('div');
          div.innerHTML = `<b>${book.title}</b> by ${book.author}`;
          container.appendChild(div);
        });
      })
      .catch(error => {
        console.error('Error loading books:', error);
      });
  </script>
</body>
</html>
