<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Healthy Recipe Finder</title>

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <nav>
    <div class="nav-wrapper green">
      <a href="#!" class="brand-logo center">Healthy Recipe Finder</a>
    </div>
  </nav>

  <main class="container">
    <div class="section center-align">
      <h3>Healthy Meal Ideas From Your Ingredients</h3>
      <p>
        This app helps users discover simple and healthy meals using ingredients you already have.
      </p>
      <a class="waves-effect waves-light btn green modal-trigger" href="#modal1">Open Form</a>
      <a class="waves-effect waves-light btn orange" id="loadRecipes">Show Recipes</a>
    </div>

    <div class="row" id="card-section"></div>
  </main>

  <!-- Modal -->
  <div id="modal1" class="modal">
    <div class="modal-content">
      <h4>Enter Ingredients</h4>
      <div class="input-field">
        <input id="ingredients" type="text" placeholder="e.g. bread, egg, milk">
        <label for="ingredients">Ingredients you have</label>
      </div>
      <div class="center-align">
        <a class="waves-effect waves-light btn green" id="formSubmit">Submit</a>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="js/scripts.js"></script>
</body>
</html>
